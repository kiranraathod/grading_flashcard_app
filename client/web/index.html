<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FlashMaster - AI-Powered Learning Platform">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FlashMaster">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FlashMaster - AI-Powered Learning</title>
  <link rel="manifest" href="manifest.json">

  <!-- 🚀 FlashMaster Clean Bookshelf Animation -->
  <style>
    /* CSS Custom Properties (converted from SCSS variables) */
    :root {
      --thickness: 5px;
      --duration: 2500ms;
      --delay: calc(var(--duration) / 6);
      --flashmaster-teal: #009688;
    }

    /* Clean Body and Container */
    body {
      background-color: var(--flashmaster-teal);
      width: 100%;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--flashmaster-teal);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.8s ease-out;
    }

    .loading-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Perfectly Centered Bookshelf Animation */
    .bookshelf_wrapper {
      position: relative;
      top: 0;
      left: 0;
      transform: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -60px; /* Move entire bookshelf up to center properly */
    }

    .books_list {
      margin: 0;
      width: 300px;
      padding: 0;
      position: relative;
      height: 140px; /* Restore height for proper book positioning */
      margin-bottom: 0;
    }

    /* Original Book Item Styling */
    .book_item {
      position: absolute;
      bottom: 0; /* Position books at bottom of container */
      box-sizing: border-box;
      list-style: none;
      width: 40px;
      height: 120px;
      opacity: 0;
      background-color: var(--flashmaster-teal);
      border: var(--thickness) solid white;
      transform-origin: bottom left; /* Keep original transform origin */
      transform: translateX(300px);
      animation: travel var(--duration) linear infinite;
    }

    /* First Book - Tallest with horizontal lines */
    .book_item.first {
      bottom: 0; /* Keep at bottom like others */
      height: 140px;
    }

    .book_item.first::before,
    .book_item.first::after {
      content: '';
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      height: var(--thickness);
      background-color: white;
    }

    .book_item.first::after {
      top: initial;
      bottom: 10px;
    }

    /* Second Book - Double lines top and bottom */
    .book_item.second::before,
    .book_item.second::after {
      box-sizing: border-box;
      content: '';
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      height: calc(var(--thickness) * 3.5);
      border-top: var(--thickness) solid white;
      border-bottom: var(--thickness) solid white;
    }

    .book_item.second::after {
      top: initial;
      bottom: 10px;
    }

    /* Third Book - Circles top and bottom */
    .book_item.third::before,
    .book_item.third::after {
      box-sizing: border-box;
      content: '';
      position: absolute;
      top: 10px;
      left: 9px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: var(--thickness) solid white;
    }

    .book_item.third::after {
      top: initial;
      bottom: 10px;
    }

    /* Fourth Book - Taller with center double line */
    .book_item.fourth {
      bottom: 0; /* Keep at bottom like others */
      height: 130px;
    }

    .book_item.fourth::before {
      box-sizing: border-box;
      content: '';
      position: absolute;
      top: 46px;
      left: 0;
      width: 100%;
      height: calc(var(--thickness) * 3.5);
      border-top: var(--thickness) solid white;
      border-bottom: var(--thickness) solid white;
    }

    /* Fifth Book - Same as second book but shorter */
    .book_item.fifth {
      bottom: 0; /* Keep at bottom like others */
      height: 100px;
    }

    .book_item.fifth::before,
    .book_item.fifth::after {
      box-sizing: border-box;
      content: '';
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      height: calc(var(--thickness) * 3.5);
      border-top: var(--thickness) solid white;
      border-bottom: var(--thickness) solid white;
    }

    .book_item.fifth::after {
      top: initial;
      bottom: 10px;
    }

    /* Sixth Book - Line and circle */
    .book_item.sixth {
      bottom: 0; /* Keep at bottom like others */
      height: 140px;
    }

    .book_item.sixth::before {
      box-sizing: border-box;
      content: '';
      position: absolute;
      bottom: 31px;
      left: 0px;
      width: 100%;
      height: var(--thickness);
      background-color: white;
    }

    .book_item.sixth::after {
      box-sizing: border-box;
      content: '';
      position: absolute;
      bottom: 10px;
      left: 9px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: var(--thickness) solid white;
    }

    /* Animation Delays (converted from SCSS nth-child) */
    .book_item:nth-child(2) {
      animation-delay: calc(var(--delay) * 1);
    }

    .book_item:nth-child(3) {
      animation-delay: calc(var(--delay) * 2);
    }

    .book_item:nth-child(4) {
      animation-delay: calc(var(--delay) * 3);
    }

    .book_item:nth-child(5) {
      animation-delay: calc(var(--delay) * 4);
    }

    .book_item:nth-child(6) {
      animation-delay: calc(var(--delay) * 5);
    }

    /* Shelf with moving polka dots */
    .shelf {
      width: 300px;
      height: var(--thickness);
      margin: 0;
      background-color: white;
      position: relative;
      /* Shelf sits immediately below books_list - no gap */
    }

    .shelf::before,
    .shelf::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      /* Polka dot pattern (converted from SCSS mixin) */
      background: var(--flashmaster-teal);
      background-image: radial-gradient(rgba(255,255,255,0.5) 30%, transparent 0);
      background-size: 10px 10px;
      background-position: 0 -2.5px;
      top: 200%;
      left: 5%;
      animation: move calc(var(--duration) / 10) linear infinite;
    }

    .shelf::after {
      top: 400%;
      left: 7.5%;
    }

    /* Original Travel Animation (exact conversion from SCSS) */
    @keyframes travel {
      0% {
        opacity: 0;
        transform: translateX(300px) rotateZ(0deg) scaleY(1);
      }
      
      6.5% {
        transform: translateX(279.5px) rotateZ(0deg) scaleY(1.1);
      }
      
      8.8% {
        transform: translateX(273.6px) rotateZ(0deg) scaleY(1);
      }
      
      10% {
        opacity: 1;
        transform: translateX(270px) rotateZ(0deg);
      }
      
      17.6% {
        transform: translateX(247.2px) rotateZ(-30deg);
      }
      
      45% {
        transform: translateX(165px) rotateZ(-30deg);
      }
      
      49.5% {
        transform: translateX(151.5px) rotateZ(-45deg);
      }
      
      61.5% {
        transform: translateX(115.5px) rotateZ(-45deg);
      }
      
      67% {
        transform: translateX(99px) rotateZ(-60deg);
      }
      
      76% {
        transform: translateX(72px) rotateZ(-60deg);
      }
      
      83.5% {
        opacity: 1;
        transform: translateX(49.5px) rotateZ(-90deg);
      }
      
      90% {
        opacity: 0;
      }
      
      100% {
        opacity: 0;
        transform: translateX(0px) rotateZ(-90deg);
      }
    }

    /* Moving polka dots animation */
    @keyframes move {
      from {
        background-position-x: 0;
      }
      
      to {
        background-position-x: 10px;
      }
    }

    /* Hide loading screen after Flutter loads */
    .flutter-loaded .loading-container {
      display: none;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .bookshelf_wrapper {
        transform: scale(0.8);
      }
    }

    @media (max-width: 480px) {
      .bookshelf_wrapper {
        transform: scale(0.7);
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .book_item,
      .shelf::before,
      .shelf::after {
        animation: none;
      }
      
      .book_item {
        opacity: 1;
        transform: translateX(0px) rotateZ(-90deg);
        position: static;
        display: inline-block;
        margin: 0 2px;
        width: 30px;
        height: 80px;
        top: auto;
      }
      
      .books_list {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <!-- 🚀 FlashMaster Clean Bookshelf Loading Screen -->
  <div id="loading-screen" class="loading-container">
    <!-- Clean Bookshelf Animation Only -->
    <div class="bookshelf_wrapper">
      <ul class="books_list">
        <li class="book_item first"></li>
        <li class="book_item second"></li>
        <li class="book_item third"></li>
        <li class="book_item fourth"></li>
        <li class="book_item fifth"></li>
        <li class="book_item sixth"></li>
      </ul>
      <div class="shelf"></div>
    </div>
  </div>

  <!-- 🚀 Simple Loading Script -->
  <script>
    // Simple transition when Flutter loads
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp().then(function(app) {
              // Small delay to ensure Flutter is fully rendered
              setTimeout(function() {
                const loadingScreen = document.getElementById('loading-screen');
                
                if (loadingScreen) {
                  loadingScreen.classList.add('fade-out');
                  setTimeout(function() {
                    loadingScreen.style.display = 'none';
                    document.body.classList.add('flutter-loaded');
                  }, 800);
                }
              }, 300);
            });
          });
        }
      });
    });

    // Failsafe: Remove loading screen after 20 seconds
    setTimeout(function() {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen && loadingScreen.style.display !== 'none') {
        loadingScreen.classList.add('fade-out');
        setTimeout(function() {
          loadingScreen.style.display = 'none';
        }, 800);
      }
    }, 20000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
